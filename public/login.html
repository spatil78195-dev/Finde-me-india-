<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Signup — Find Me India</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🔍</div>
      <h2 style="font-weight:800;font-size:1.3rem;">Find Me India</h2>
      <p class="text-muted" style="font-size:0.85rem;">Missing People Awareness Platform</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="alertArea"></div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        Login →
      </button>
      <p style="text-align:center;margin-top:14px;font-size:0.85rem;color:var(--text-muted);">
        Don't have an account? <a onclick="switchTab('signup')" style="color:var(--primary);cursor:pointer;font-weight:600;">Sign up</a>
      </p>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="signupName" class="form-control" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" id="signupPhone" class="form-control" placeholder="10-digit number" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="signupPassword" class="form-control" placeholder="Min 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label class="form-label">Register As</label>
        <select id="signupRole" class="form-control" onchange="toggleCompanyField()">
          <option value="user">👤 Citizen / General User</option>
          <option value="ngo">🤝 NGO Organization</option>
          <option value="police">👮 Police Department</option>
          <option value="company">🏢 E-commerce Company</option>
          <option value="admin">⚙️ Admin (requires key)</option>
        </select>
      </div>
      <div class="form-group hidden" id="companyNameGroup">
        <label class="form-label">Company Name</label>
        <input type="text" id="signupCompanyName" class="form-control" placeholder="Your company name" />
      </div>
      <div class="form-group hidden" id="adminKeyGroup">
        <label class="form-label">Admin Key</label>
        <input type="password" id="signupAdminKey" class="form-control" placeholder="Enter admin secret key" />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="signupBtn">
        Create Account →
      </button>
      <p style="text-align:center;margin-top:14px;font-size:0.85rem;color:var(--text-muted);">
        Already have an account? <a onclick="switchTab('login')" style="color:var(--primary);cursor:pointer;font-weight:600;">Login</a>
      </p>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const initTab = urlParams.get('tab');
    const initRole = urlParams.get('role');

    // If explicit signup requested, clear existing auth so they can register a new account
    if (initTab === 'signup' && getToken()) {
      clearAuth();
    }

    // Redirect if already logged in (and not trying to sign up)
    if (getToken()) {
      const user = getUser();
      if (user?.role === 'admin') location.href = '/admin.html';
      else if (user?.role === 'company') location.href = '/company.html';
      else location.href = '/dashboard.html';
    }

    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
      document.getElementById('alertArea').innerHTML = '';
    }

    function toggleCompanyField() {
      const role = document.getElementById('signupRole').value;
      document.getElementById('companyNameGroup').classList.toggle('hidden', role !== 'company');
      document.getElementById('adminKeyGroup').classList.toggle('hidden', role !== 'admin');
    }

    // Apply URL parameters immediately to prepopulate the form
    if (initTab === 'signup') {
      switchTab('signup');
      if (initRole) {
        document.getElementById('signupRole').value = initRole;
        toggleCompanyField();
      }
    }

    function friendlyError(msg) {
      if (msg && (msg.includes('Database not connected') || msg.includes('buffering') || msg.includes('503'))) {
        return '⚠️ <strong>Database not connected.</strong> Please set your MongoDB Atlas URI in the <code>.env</code> file and restart the server. <a href="https://www.mongodb.com/atlas/database" target="_blank" style="color:var(--primary);">Get free Atlas cluster →</a>';
      }
      return msg;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span class="spinner"></span> Logging in…'; btn.disabled = true;
      try {
        const { token, user } = await api.auth.login({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        });
        setAuth(token, user);
        const alertArea = document.getElementById('alertArea');
        showAlert(alertArea, 'Login successful! Redirecting…', 'success');
        setTimeout(() => {
          if (user.role === 'admin') location.href = '/admin.html';
          else if (user.role === 'company') location.href = '/company.html';
          else location.href = '/dashboard.html';
        }, 800);
      } catch (err) {
        document.getElementById('alertArea').innerHTML = `<div class="alert alert-error">${friendlyError(err.message)}</div>`;
        btn.innerHTML = 'Login →'; btn.disabled = false;
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      const role = document.getElementById('signupRole').value;
      if (role === 'admin') {
        const key = document.getElementById('signupAdminKey').value;
        if (key !== 'admin@2024') { showAlert(document.getElementById('alertArea'), 'Invalid admin key'); return; }
      }
      // Basic validations
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      if (!name) { showAlert(document.getElementById('alertArea'), 'Full name is required'); return; }
      if (!email) { showAlert(document.getElementById('alertArea'), 'Email is required'); return; }
      if (password.length < 6) { showAlert(document.getElementById('alertArea'), 'Password must be at least 6 characters'); return; }

      btn.innerHTML = '<span class="spinner"></span> Creating…'; btn.disabled = true;
      try {
        const { token, user } = await api.auth.signup({
          name,
          email,
          password,
          phone: document.getElementById('signupPhone').value,
          role,
          companyName: document.getElementById('signupCompanyName').value
        });
        setAuth(token, user);
        showAlert(document.getElementById('alertArea'), 'Account created! Redirecting…', 'success');
        setTimeout(() => {
          if (user.role === 'admin') location.href = '/admin.html';
          else if (user.role === 'company') location.href = '/company.html';
          else location.href = '/dashboard.html';
        }, 800);
      } catch (err) {
        document.getElementById('alertArea').innerHTML = `<div class="alert alert-error">${friendlyError(err.message)}</div>`;
        btn.innerHTML = 'Create Account →'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
